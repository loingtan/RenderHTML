version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: html-viewer-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: html-viewer-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=html_viewer
      - CORS_ORIGINS=*
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: html-viewer-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
